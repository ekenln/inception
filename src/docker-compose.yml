services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - 3306
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - wp-data:/var/www/wordpress
    expose:
      - 9000
    networks:
      - inception
    depends_on:
      - mariadb

  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - wp-data:/var/www/wordpress
    ports:
      - "8443:8443"
    networks:
      - inception
    depends_on:
      - wordpress

volumes:
  db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eeklund/data/mariadb
  wp-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eeklund/data/wordpress

networks:
  inception:
    driver: bridge
